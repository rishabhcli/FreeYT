<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FreeYT</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="shell">
    <div class="panel">
      <header class="header" role="banner">
        <div class="header-left">
          <img src="images/icon-48.png" alt="" width="28" height="28" class="app-icon" />
          <div class="header-text">
            <h1 class="app-name">FreeYT</h1>
            <p class="header-subtitle">PRIVACY &middot; YOUTUBE.COM</p>
          </div>
        </div>
        <span id="statusPill" class="status-badge" role="status" aria-live="polite">Active</span>
      </header>

      <main class="actions" role="main">
        <div class="action-row" id="toggleRow">
          <span class="action-icon" aria-hidden="true">&#x1F6E1;&#xFE0F;</span>
          <div class="action-text">
            <p class="action-title" id="statusText">Protection Enabled</p>
            <p class="action-subtitle" id="statusDetail">Redirecting to youtube-nocookie.com</p>
          </div>
          <label class="switch" aria-label="Toggle protection">
            <input type="checkbox" id="enabledToggle" role="switch" aria-checked="true" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="action-row clickable" id="allowlistRow">
          <span class="action-icon" aria-hidden="true">&#x1F4CB;</span>
          <div class="action-text">
            <p class="action-title">Manage Allowlist</p>
            <p class="action-subtitle">Domains that bypass redirect <span id="allowlistCount"></span></p>
          </div>
          <span class="action-chevron" aria-hidden="true">&#x203A;</span>
        </div>

        <div class="action-row clickable" id="refreshRow">
          <span class="action-icon" aria-hidden="true">&#x1F504;</span>
          <div class="action-text">
            <p class="action-title">Refresh State</p>
            <p class="action-subtitle">Sync with Safari</p>
          </div>
          <span class="action-chevron" aria-hidden="true">&#x203A;</span>
        </div>
      </main>

      <div class="allowlist-panel" id="allowlistPanel" hidden>
        <div class="allowlist-input-row">
          <input type="text" id="allowlistInput" class="allowlist-input" placeholder="e.g. music.youtube.com" aria-label="Domain to allowlist" />
          <button type="button" id="allowlistAdd" class="btn-add">Add</button>
        </div>
        <ul id="allowlistEntries" class="allowlist-list" aria-label="Allowlisted domains"></ul>
      </div>

      <footer class="stats-footer" role="contentinfo">
        <div class="stats-row">
          <div class="stat"><span id="todayCount" class="stat-value">0</span><span class="stat-label">TODAY</span></div>
          <div class="stat"><span id="weekCount" class="stat-value">0</span><span class="stat-label">THIS WEEK</span></div>
          <div class="stat"><span id="videoCount" class="stat-value">0</span><span class="stat-label">ALL TIME</span></div>
        </div>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
