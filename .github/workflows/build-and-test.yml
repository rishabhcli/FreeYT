name: Build and Test

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available destinations
        run: xcodebuild -project FreeYT.xcodeproj -scheme FreeYT -showdestinations

      - name: Build for iOS Simulator
        run: |
          set -euo pipefail
          mkdir -p TestResults
          xcodebuild clean build \
            -project FreeYT.xcodeproj \
            -scheme FreeYT \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -configuration Debug \
            -resultBundlePath TestResults/ios-build.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-results
          path: |
            TestResults/ios-build.xcresult
            ~/Library/Logs/DiagnosticReports
          retention-days: 5
          if-no-files-found: ignore

  build-catalyst:
    name: Build Mac Catalyst App
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build for Mac Catalyst
        run: |
          set -euo pipefail
          mkdir -p TestResults
          xcodebuild clean build \
            -project FreeYT.xcodeproj \
            -scheme FreeYT \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            -configuration Debug \
            -resultBundlePath TestResults/catalyst-build.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload Catalyst build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalyst-build-results
          path: TestResults/catalyst-build.xcresult
          retention-days: 5
          if-no-files-found: ignore

  test:
    name: Run Swift Tests
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run unit tests
        run: |
          set -euo pipefail
          mkdir -p TestResults
          xcodebuild test \
            -project FreeYT.xcodeproj \
            -scheme FreeYT \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -configuration Debug \
            -resultBundlePath TestResults/swift-tests.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-results
          path: TestResults/swift-tests.xcresult
          retention-days: 14
          if-no-files-found: ignore

  extension-tests:
    name: Run Extension Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FreeYT Extension/Tests/package-lock.json

      - name: Install extension test dependencies
        working-directory: FreeYT Extension/Tests
        run: npm ci

      - name: Run extension test suite
        working-directory: FreeYT Extension/Tests
        run: npm test

  validate:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run repository validation
        run: .github/scripts/validate-repo.sh

  screenshots:
    name: Generate Screenshots
    runs-on: macos-15
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run screenshot tests
        run: |
          set -euo pipefail
          mkdir -p TestResults
          xcodebuild test \
            -project FreeYT.xcodeproj \
            -scheme FreeYT \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -only-testing:FreeYTUITests/ScreenshotTests \
            -configuration Debug \
            -resultBundlePath TestResults/screenshots.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO || true

      - name: Collect screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: |
            TestResults/screenshots.xcresult
            ~/Library/Developer/Xcode/DerivedData/**/Attachments
          retention-days: 30
          if-no-files-found: ignore

  summary:
    name: Build Summary
    needs: [build-ios, build-catalyst, test, extension-tests, validate]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "Build Summary:"
          echo "- iOS Build: ${{ needs.build-ios.result }}"
          echo "- Catalyst Build: ${{ needs.build-catalyst.result }}"
          echo "- Swift Tests: ${{ needs.test.result }}"
          echo "- Extension Tests: ${{ needs.extension-tests.result }}"
          echo "- Validation: ${{ needs.validate.result }}"

          if [ "${{ needs.build-ios.result }}" = "success" ] && \
             [ "${{ needs.build-catalyst.result }}" = "success" ] && \
             [ "${{ needs.test.result }}" = "success" ] && \
             [ "${{ needs.extension-tests.result }}" = "success" ] && \
             [ "${{ needs.validate.result }}" = "success" ]; then
            echo "✓ All critical checks passed"
            exit 0
          fi

          echo "✗ One or more checks failed"
          exit 1
